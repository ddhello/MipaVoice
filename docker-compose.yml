services:
  mipavoice:
    build:
      context: .
      dockerfile: Dockerfile
    image: mipavoice-server:latest
    container_name: mipavoice-server
    restart: unless-stopped
    network_mode: host
    environment:
      MIPAVOICE_BIND_ADDR: 0.0.0.0:3901
      MIPAVOICE_DATABASE_URL: sqlite:///data/mipavoice.db
      MIPAVOICE_SFU_URL: ${MIPAVOICE_SFU_URL:-/sfu}
      MIPAVOICE_SFU_SECRET: ${MIPAVOICE_SFU_SECRET:-dev-secret-change-me}
      MIPAVOICE_SFU_PUBLIC_IP: ${MIPAVOICE_SFU_PUBLIC_IP:-}
      MIPAVOICE_SFU_UDP_PORT: ${MIPAVOICE_SFU_UDP_PORT:-50000}
      MIPAVOICE_SFU_UDP_PORT_MAX: ${MIPAVOICE_SFU_UDP_PORT_MAX:-50100}
      MIPAVOICE_ICE_SERVERS: ${MIPAVOICE_ICE_SERVERS:-stun:stun.l.google.com:19302}
      MIPAVOICE_ICE_USERNAME: ${MIPAVOICE_ICE_USERNAME:-}
      MIPAVOICE_ICE_CREDENTIAL: ${MIPAVOICE_ICE_CREDENTIAL:-}
    volumes:
      - mipavoice-data:/data

volumes:
  mipavoice-data:
