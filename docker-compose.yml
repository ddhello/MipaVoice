services:
  mipavoice:
    build:
      context: .
      dockerfile: Dockerfile
    image: mipavoice-server:latest
    container_name: mipavoice-server
    restart: unless-stopped
    network_mode: host
    environment:
      MIPAVOICE_BIND_ADDR: 0.0.0.0:3901
      MIPAVOICE_DATABASE_URL: sqlite:///data/mipavoice.db
      MIPAVOICE_SFU_URL: ${MIPAVOICE_SFU_URL:-/sfu}
      MIPAVOICE_SFU_SECRET: ${MIPAVOICE_SFU_SECRET:-dev-secret-change-me}
    volumes:
      - mipavoice-data:/data

volumes:
  mipavoice-data:
